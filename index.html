<div class="modal fade" id="registroModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">

      <!-- HEADER -->
      <div class="modal-header">
        <h5 class="modal-title">Formulario para Asociarse</h5>

        <button type="button"
                class="btn-close"
                data-bs-dismiss="modal">
        </button>
      </div>

      <!-- BODY -->
      <div class="modal-body p-4">

        <form class="needs-validation" >

          <!-- NOMBRE -->
          <div class="mb-3">
            <label class="form-label">Nombre completo</label>

            <input type="name"
                   class="form-control"
                   required>
          </div>

          <!-- EMAIL -->
          <div class="mb-3">
            <label class="form-label">Email</label>

            <input type="email"
                   class="form-control"
                   required>
          </div>

          <!-- PASSWORD -->
          <div class="mb-3">
            <label class="form-label">Contraseña</label>

            <input type="password"
                   class="form-control"
                   minlength="6"
                   required>
          </div>

          <!-- TELÉFONO -->
          <div class="mb-3">
            <label class="form-label">Teléfono</label>
            <input type="tel"
                   class="form-control"
                   required>
          </div>

          <!-- CHECK -->
          <div class="form-check mb-4">
            <input class="form-check-input"
                   type="checkbox"
                   required>

            <label class="form-check-label">
              Estoy de acuerdo con recibir notificaciones por correo
            </label>
          </div>

          <!-- BOTONES -->
          <div class="d-flex gap-2">
            <button class="btn btn-success"
                    type="submit"
                    data-bs-dismiss="modal">
              Registrarse
            </button>

            <button class="btn btn-secondary"
                    type="button"
                    data-bs-dismiss="modal">
              Cancelar
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
