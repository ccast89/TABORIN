<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="./assets/logo.jpeg" type="image/x-jpeg" />
    <title>Club Taborin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zilla+Slab:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/global.css" />
    <link rel="stylesheet" href="./css/contacto.css" />
  </head>
  <body>
    <header></header>
    <main class="container px-4">
      <section class="row text-center">
        <h1 class="col">Club TABORIN</h1>
      </section>
      <section class="row text-center">
        <h2 class="col">CONTACTO</h2>
      </section>
      <section class="row">
        <h3 class="col">Dejános tu consulta</h3>
      </section>
      <section class="">
        <form action="" class="row g-3 my-2 p-2 needs-validation" novalidate>
          <div class="col-12 col-md-6 mb-2 fw-bold">
            <label for="nombre" class="form-label fw-bold">Nombre</label>
            <input
              type="text"
              class="form-control"
              placeholder="Nombre y Apellido"
              id="nombre"
              aria-label="Nombre"
              required
            />
            <div class="invalid-feedback">Por favor, escribe tu nombre</div>
          </div>
          <div class="col-12 col-md-6 mb-2 fw-bold">
            <label for="nombre" class="form-label fw-bold"
              >Correo Electrónico</label
            >
            <input
              type="email"
              class="form-control"
              placeholder="ejemplo@ejemplo.com"
              id="email"
              aria-label="email"
              required
            />
            <div class="invalid-feedback">El email no es válido</div>
          </div>
          <div class="col-12 col-md-6 mb-2 fw-bold">
            <label for="telefono" class="form-label fw-bold">Teléfono</label>
            <input
              type="number"
              class="form-control"
              placeholder="Ingresa tu teléfono sin el 0 y sin el 15"
              id="telefono"
              aria-label="telefono"
              required
            />
            <div class="invalid-feedback">
              Ingresa un número de teléfono válido
            </div>
          </div>
          <div class="col-12 col-md-6 mb-2 fw-bold">
            <label for="asunto" class="form-label fw-bold"
              >Motivo de la consulta</label
            >
            <select class="form-select" name="asunto" id="asunto" novalidate>
              <option selected>Selecciona una opción</option>
              <option value="1">Equipo Masculino</option>
              <option value="2">Equipo Femenino</option>
              <option value="3">Equipo Niños</option>
              <option value="4">Otro</option>
            </select>
          </div>
          <div class="col-12 fw-bold mb-2">
            <label for="mensaje" class="form-label fw-bold"
              >Escribe tu duda o consulta</label
            >
            <textarea
              name="mensaje"
              id="mensaje"
              class="form-control"
              placeholder="Dejá tu mensaje aquí y te responderemos"
              required
            ></textarea>
            <div class="invalid-feedback">Por favor, escribe tu mensaje</div>
          </div>
          <div class="d-grid gap-2 mx-auto d-md-block d-md-flex mb-2">
            <input class="btn col-md-2" type="submit" value="Enviar" />
            <input class="btn col-md-2" type="reset" value="Borrar" />
          </div>
        </form>
      </section>
      <section>
        <h3>Dónde Estamos</h3>
        <div class="ratio ratio-16x9">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d4047.045313738485!2d-64.15083637797412!3d-31.465172553136405!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9432a3332b4cb5f7%3A0x723623db2b72f83c!2sCno.%20A%2060%20Cuadras%2C%20X5014%20C%C3%B3rdoba!5e0!3m2!1ses-419!2sar!4v1778709223833!5m2!1ses-419!2sar"
            width="600"
            height="450"
            style="border: 0"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          >
          </iframe>
        </div>
      </section>
    </main>
    <footer></footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script>
      // Example starter JavaScript for disabling form submissions if there are invalid fields
      (() => {
        "use strict";

        // Fetch all the forms we want to apply custom Bootstrap validation styles to
        const forms = document.querySelectorAll(".needs-validation");

        // Loop over them and prevent submission
        Array.from(forms).forEach((form) => {
          form.addEventListener(
            "submit",
            (event) => {
              if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
              }

              form.classList.add("was-validated");
            },
            false,
          );
        });
      })();
    </script>
  </body>
</html>
